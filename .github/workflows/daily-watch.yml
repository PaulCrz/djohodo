name: Daily portfolio watch

on:
  schedule:
    # 06:00 UTC every day. Adjust if you want a different morning timezone.
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write   # needed to commit the generated digest back to the repo

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Materialise portfolio.json from secret
        # Store the JSON payload in the PORTFOLIO_JSON secret.
        env:
          PORTFOLIO_JSON: ${{ secrets.PORTFOLIO_JSON }}
        run: |
          if [ -z "$PORTFOLIO_JSON" ]; then
            echo "::error::PORTFOLIO_JSON secret is not set." >&2
            exit 1
          fi
          printf '%s' "$PORTFOLIO_JSON" > portfolio.json

      - name: Run Djohodo watcher
        env:
          # Subscription-credit path: long-lived OAuth token generated locally
          # with `claude setup-token` and stored as the CLAUDE_CODE_OAUTH_TOKEN
          # repo secret. The Claude Agent SDK picks it up automatically.
          # ANTHROPIC_API_KEY is deliberately NOT set, so the SDK falls back
          # to the OAuth token rather than billing pay-as-you-go.
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          DJOHODO_MODEL: ${{ vars.DJOHODO_MODEL || 'claude-haiku-4-5-20251001' }}
          DJOHODO_EMAIL_ENABLED: ${{ vars.DJOHODO_EMAIL_ENABLED || '0' }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
          # Telegram (Bot API) — see README. Toggle is a repo variable,
          # the bot token + chat id are secrets.
          DJOHODO_TELEGRAM_ENABLED: ${{ vars.DJOHODO_TELEGRAM_ENABLED || '0' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Upload digest as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: djohodo-digest
          path: digests/*.md
          if-no-files-found: warn

      - name: Commit digest back to the repo
        if: success()
        run: |
          git config user.name  "djohodo-bot"
          git config user.email "djohodo-bot@users.noreply.github.com"
          # -f bypasses .gitignore (digests/* is locally ignored to keep
          # ad-hoc runs out of git; CI is the legitimate publisher).
          git add -f digests/*.md || true
          if git diff --cached --quiet; then
            echo "No new digest to commit."
          else
            git commit -m "chore(digest): daily watch $(date -u +%Y-%m-%d)"
            git push
          fi
